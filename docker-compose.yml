version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hotel-ops-db
    environment:
      POSTGRES_DB: hotel_ops
      POSTGRES_USER: hotel_api_user
      POSTGRES_PASSWORD: localdev123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/sql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hotel_api_user -d hotel_ops']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
