timeout: 1200s

steps:
  - id: install
    name: node:20
    entrypoint: npm
    args: ['ci']

  - id: lint
    name: node:20
    entrypoint: npm
    args: ['run', 'lint']
    waitFor: ['install']

  - id: typecheck
    name: node:20
    entrypoint: npm
    args: ['run', 'typecheck']
    waitFor: ['install']

  - id: test
    name: node:20
    entrypoint: npm
    args: ['run', 'test']
    waitFor: ['install']

  # ── hotel-api image ────────────────────────────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:latest
      - -f
      - packages/api/Dockerfile
      - .
    waitFor: ['lint', 'typecheck', 'test']

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api
    waitFor: ['build-api']

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hotel-api
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:$SHORT_SHA
      - --region=us-central1
      - --project=$PROJECT_ID
    waitFor: ['push-api']

  # ── realtime-sync image ────────────────────────────────────────────────────
  - id: build-realtime-sync
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/realtime-sync:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/realtime-sync:latest
      - -f
      - packages/realtime-sync/Dockerfile
      - packages/realtime-sync
    waitFor: ['lint', 'typecheck', 'test']

  - id: push-realtime-sync
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/realtime-sync
    waitFor: ['build-realtime-sync']

  - id: deploy-realtime-sync
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - realtime-sync
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/realtime-sync:$SHORT_SHA
      - --region=us-central1
      - --project=$PROJECT_ID
    waitFor: ['push-realtime-sync']

  # ── web ────────────────────────────────────────────────────────────────────
  - id: web-build
    name: node:20
    entrypoint: npm
    args: ['run', 'build', '-w', 'packages/web']
    waitFor: ['lint', 'typecheck', 'test']

  - id: web-deploy
    name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - rsync
      - -r
      - -d
      - packages/web/dist
      - gs://$PROJECT_ID-hotel-ops-web
    waitFor: ['web-build']

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:latest
  - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/realtime-sync:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/realtime-sync:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
