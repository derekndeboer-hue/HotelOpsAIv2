timeout: 1200s

steps:
  - id: install
    name: node:20
    entrypoint: npm
    args: ['ci']

  - id: lint
    name: node:20
    entrypoint: npm
    args: ['run', 'lint']
    waitFor: ['install']

  - id: typecheck
    name: node:20
    entrypoint: npm
    args: ['run', 'typecheck']
    waitFor: ['install']

  - id: test
    name: node:20
    entrypoint: npm
    args: ['run', 'test']
    waitFor: ['install']

  - id: docker-build-push
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:latest
      - -f
      - packages/api/Dockerfile
      - .
    waitFor: ['lint', 'typecheck', 'test']

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api
    waitFor: ['docker-build-push']

  - id: web-build
    name: node:20
    entrypoint: npm
    args: ['run', 'build:web']
    waitFor: ['lint', 'typecheck', 'test']

  - id: web-deploy
    name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - rsync
      - -r
      - -d
      - packages/web/dist
      - gs://$PROJECT_ID-hotel-ops-web
    waitFor: ['web-build']

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/hotel-ops/hotel-api:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
