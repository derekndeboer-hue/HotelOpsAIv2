name: Deploy HotelOpsAI

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/291896422232/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions-deployer@hotelopsai-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: hotelopsai-prod

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config=infrastructure/cloudbuild.yaml \
            --project=hotelopsai-prod \
            --substitutions=SHORT_SHA=${GITHUB_SHA::7}
