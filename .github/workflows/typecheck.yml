name: Typecheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build shared declarations
        # api and web use project references to shared; shared must emit .d.ts
        # before downstream --noEmit checks can resolve its types.
        run: npx tsc -p packages/shared/tsconfig.json
      - name: Typecheck api
        run: npx tsc --noEmit -p packages/api/tsconfig.json
      - name: Typecheck web
        run: npx tsc --noEmit -p packages/web/tsconfig.json
